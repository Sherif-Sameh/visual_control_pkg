### TCP Calibration (PyTorch3D) Configuration ###

[calibration]

# SAM2 parameters
"sam.variant" = "sam2.1-hiera-tiny"
"sam.prompt.type" = "points"
"sam.prompt.n_pos" = 2
"sam.prompt.n_neg" = 3

# Mesh parameters
"dr.mesh.radius" = 0.003
"dr.mesh.height" = 0.025
"dr.mesh.resolution" = 20
"dr.mesh.split" = 4

# Pose initialization parameters
"dr.init.dist" = 0.125
"dr.init.elev" = 135.0
"dr.init.azim" = 0.0

# Model parameters
"dr.model.radius" = false
"dr.model.height" = true

# Shader parameters
"dr.shader.sil.sigma" = 2e-5
"dr.shader.sil.gamma" = 1e-4
"dr.shader.depth" = false
"dr.shader.depth.zfar" = 5.0

# Rasterization parameters
"dr.raster.size" = 256
"dr.raster.n_faces" = 10

# Optimizer parameters
"dr.optim.n_rep" = 8
"dr.optim.sigma" = [0.003, 0.01]
"dr.optim.loss" = ["mse_loss"]
"dr.optim.lr" = 0.05
"dr.optim.sched" = true
"dr.optim.sched.eta_min" = 1e-5
"dr.optim.n_iter" = 100