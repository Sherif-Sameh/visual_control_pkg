[overrides-simple-nvdiffrast]
"dr.model.res" = 256


[overrides-mipmap-cuda]
"dr.model.res" = 512


[overrides-mipmap-nvdiffrast]
"dr.model.res" = 512


[overrides-hashenc-cuda]
"dr.model.res" = 1024
"dr.model.n_level" = 16


[overrides-hashenc-nvdiffrast]
"dr.model.res" = 1024
"dr.model.n_level" = 16
