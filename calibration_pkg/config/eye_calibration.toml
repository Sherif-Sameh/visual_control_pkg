### Eye Calibration Configuration ###

[calibration]

# Reference pose parameters
"ref.pose.tol" = [0.005, 0.025]

# SAM2 parameters
"sam.variant" = "sam2.1-hiera-small"
"sam.prompt.n_pos" = 3
"sam.prompt.n_neg" = 6

# Target pose parameters
"pose.n_view_sqrt" = 3
"pose.range.dist" = [0.25, 0.325]
"pose.range.elev" = [15.0, -10.0] 
"pose.range.azim" = [2.5, -10.0]

# Mesh parameters
"dr.mesh.scale" = 1.0
"dr.mesh.elev_lim" = [-25.0, 20.0]
"dr.mesh.azim_lim" = [-90.0, 90.0]

# Model parameters
"dr.model.res" = 512
"dr.model.scale" = 0.05
"dr.model.mesh_scale" = 0.5
"dr.model.n_level" = 5
"dr.model.log2_hsz" = 14
"dr.model.mlp_n_layer" = 0

# Shader parameters
"dr.shader.sigma" = 3e-5
"dr.shader.boxlen" = 1e-2
"dr.shader.knum" = 10

# Rasterization parameters
"dr.raster.size" = 256

# Optimizer parameters
"dr.optim.loss" = ["l1_loss", "l1_loss"]
"dr.optim.loss.weights" = [0.5, 0.5]
"dr.optim.loss.symmetry" = 5e-2
"dr.optim.loss.tan_norm" = 5e-4
"dr.optim.loss.laplacian" = 1e-2
"dr.optim.lr" = 2e-2
"dr.optim.sched.T_0" = 150
"dr.optim.sched.T_mult" = 1
"dr.optim.sched.eta_min" = 1e-4
"dr.optim.n_iter.init" = 50
"dr.optim.n_iter.text" = 20
"dr.optim.n_iter.full" = 300


# Model-type and backend specific overrides
[overrides-simple-cuda]
"dr.model.res" = 256
